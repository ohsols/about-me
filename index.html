  <!-- SPA GITHUB PAGES FIX -->
  <script type="text/javascript">
    (function (l) {
      if (l.search[1] === "p") {
        var decoded = l.search
          .slice(1)
          .split("&")
          .map(function (s) {
            return s.replace(/~and~/g, "&");
          })
          .filter(function (s) {
            return s.slice(0, 2) === "p=";
          })[0]
          .slice(2);

        if (decoded !== l.pathname) {
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) +
              decoded +
              (l.search
                .slice(1)
                .split("&")
                .filter(function (s) {
                  return s.slice(0, 2) !== "p=";
                })
                .join("&")
                ? "?" +
                  l.search
                    .slice(1)
                    .split("&")
                    .filter(function (s) {
                      return s.slice(0, 2) !== "p=";
                    })
                    .join("&")
                : "") +
              l.hash
          );
        }
      }
    })(window.location);
  </script>
